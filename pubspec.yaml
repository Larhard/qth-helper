name: qth_dashboard
description: GPS navigation dashboard — heading, coordinates, IARU/MGRS locator, city finder, waypoints.
publish_to: 'none'
version: 1.1.0+3

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  geolocator: ^14.0.2
  flutter_compass: ^0.8.0
  get_storage: ^2.1.1   # pure Dart, no Android plugin → no KGP issues
  url_launcher: ^6.3.2  # open links in the city/port detail sheet
  share_plus: ^10.1.3   # share GPX export via Android share sheet
  file_picker: ^8.3.7   # pick GPX file for import
  path_provider: ^2.1.5 # temp directory for GPX file staging

dev_dependencies:
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: false
  # Flat icon used for legacy Android launcher targets
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  # Adaptive icon (Android 8+): solid navy background + transparent foreground
  adaptive_icon_background: "#0A0F1E"
  adaptive_icon_foreground: "assets/icon/app_icon_fg.png"

flutter:
  uses-material-design: true
  assets:
    - assets/cities.tsv
    - assets/cities_precise.tsv
    - assets/cities_detailed.tsv
    - assets/ports.tsv
